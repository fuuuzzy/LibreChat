<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}LibreChat Dashboard{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            surface: { 50:'#fafafa', 100:'#f4f4f5', 200:'#e4e4e7', 300:'#d4d4d8', 400:'#a1a1aa', 500:'#71717a', 600:'#52525b', 700:'#3f3f46', 800:'#27272a', 900:'#18181b' },
            gold: { 50:'#fffbeb', 100:'#fef3c7', 200:'#fde68a', 300:'#fcd34d', 400:'#fbbf24', 500:'#f59e0b', 600:'#d97706', 700:'#b45309', 800:'#92400e', 900:'#78350f' },
            amber: { 400:'#fbbf24', 500:'#f59e0b' },
          },
          fontFamily: {
            sans: ['Instrument Sans', 'system-ui', 'sans-serif'],
            mono: ['IBM Plex Mono', 'Menlo', 'monospace'],
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Instrument Sans', system-ui, sans-serif; }
    .font-mono { font-family: 'IBM Plex Mono', Menlo, monospace; }

    /* Animated gradient background */
    .bg-glass-bg {
      background: linear-gradient(135deg, #f0f4f8 0%, #e2e8f0 25%, #f1f5f9 50%, #e8ecf0 75%, #f3f6f9 100%);
      background-size: 400% 400%;
      animation: gradientShift 15s ease infinite;
    }
    @keyframes gradientShift {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    /* Subtle dot pattern overlay */
    .bg-dot-pattern {
      background-image: radial-gradient(circle, rgba(148,163,184,0.15) 1px, transparent 1px);
      background-size: 24px 24px;
    }

    /* Frosted glass card — white glass effect */
    .glass-card {
      background: rgba(255,255,255,0.75);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.8);
      box-shadow:
        0 4px 24px rgba(0,0,0,0.06),
        0 1px 2px rgba(0,0,0,0.04),
        inset 0 1px 0 rgba(255,255,255,0.9);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .glass-card:hover {
      background: rgba(255,255,255,0.85);
      box-shadow:
        0 8px 32px rgba(0,0,0,0.08),
        0 2px 4px rgba(0,0,0,0.04),
        inset 0 1px 0 rgba(255,255,255,1);
      transform: translateY(-2px);
    }

    /* Bento card variant — premium glass */
    .bento-card {
      background: rgba(255,255,255,0.7);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,0.9);
      box-shadow:
        0 4px 24px rgba(0,0,0,0.05),
        0 1px 2px rgba(0,0,0,0.03),
        inset 0 2px 0 rgba(255,255,255,1);
      position: relative;
      overflow: hidden;
    }
    .bento-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,1), transparent);
    }
    .bento-card::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      pointer-events: none;
      background: radial-gradient(ellipse at 30% 0%, rgba(251,191,36,0.04) 0%, transparent 50%);
    }

    /* Stat card with subtle gradient border */
    .stat-glow {
      position: relative;
      overflow: hidden;
      background: rgba(255,255,255,0.8);
    }
    .stat-glow::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, #fbbf24, #f59e0b, #d97706);
      opacity: 0.8;
    }

    /* Ambient spotlight */
    .ambient-spotlight {
      position: relative;
    }
    .ambient-spotlight::before {
      content: '';
      position: absolute;
      top: -50%; left: -30%;
      width: 160%; height: 160%;
      background: radial-gradient(ellipse, rgba(251,191,36,0.05) 0%, transparent 60%);
      pointer-events: none;
    }

    /* Navigation */
    .nav-link {
      position: relative;
      transition: all 0.2s ease;
      color: #64748b;
    }
    .nav-link:hover {
      color: #1e293b;
      background: rgba(0,0,0,0.03);
    }
    .nav-link.active {
      background: rgba(251,191,36,0.1);
      color: #b45309;
    }
    .nav-link.active::before {
      content: '';
      position: absolute;
      left: 0; top: 50%;
      transform: translateY(-50%);
      width: 3px; height: 60%;
      background: linear-gradient(180deg, #fbbf24, #f59e0b);
      border-radius: 0 2px 2px 0;
    }

    /* Table styling */
    .data-table thead th {
      background: rgba(0,0,0,0.02);
      border-bottom: 1px solid rgba(0,0,0,0.06);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #64748b;
      padding: 0.75rem 1rem;
    }
    .data-table tbody tr {
      border-bottom: 1px solid rgba(0,0,0,0.04);
      transition: background 0.15s ease;
    }
    .data-table tbody tr:hover {
      background: rgba(251,191,36,0.04);
    }
    .data-table tbody td {
      padding: 0.75rem 1rem;
      color: #334155;
      font-size: 0.85rem;
    }

    /* Badge */
    .badge { font-family: 'IBM Plex Mono', monospace; font-size: 0.65rem; letter-spacing: 0.05em; padding: 0.15rem 0.5rem; border-radius: 6px; font-weight: 500; }
    .badge-prompt { background: rgba(251,191,36,0.15); color: #b45309; }
    .badge-completion { background: rgba(251,191,36,0.25); color: #92400e; }
    .badge-error { background: rgba(239,68,68,0.1); color: #dc2626; }
    .badge-default { background: rgba(100,116,139,0.1); color: #475569; }

    /* Message bubbles */
    .msg-user {
      background: linear-gradient(135deg, rgba(251,191,36,0.1) 0%, rgba(253,224,71,0.06) 100%);
      border-left: 3px solid #f59e0b;
      border-radius: 0 8px 8px 0;
    }
    .msg-assistant {
      background: linear-gradient(135deg, rgba(99,110,140,0.08) 0%, rgba(148,163,184,0.04) 100%);
      border-left: 3px solid #94a3b8;
      border-radius: 0 8px 8px 0;
    }

    /* Staggered fade-in */
    .fade-in { animation: fadeUp 0.4s ease-out both; }
    .fade-in-1 { animation-delay: 0.05s; }
    .fade-in-2 { animation-delay: 0.1s; }
    .fade-in-3 { animation-delay: 0.15s; }
    .fade-in-4 { animation-delay: 0.2s; }
    .fade-in-5 { animation-delay: 0.25s; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: rgba(0,0,0,0.02); border-radius: 4px; }
    ::-webkit-scrollbar-thumb { background: rgba(100,116,139,0.2); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(100,116,139,0.35); }

    /* Input styling */
    .input-dark {
      background: rgba(255,255,255,0.8);
      border: 1px solid rgba(0,0,0,0.08);
      color: #1e293b;
      transition: all 0.2s ease;
    }
    .input-dark:focus {
      outline: none;
      border-color: #fbbf24;
      box-shadow: 0 0 0 3px rgba(251,191,36,0.15);
    }
    .input-dark::placeholder { color: #94a3b8; }

    /* Button — primary gold */
    .btn-gold {
      background: linear-gradient(135deg, #d97706, #f59e0b);
      color: #fff;
      font-weight: 600;
      transition: all 0.2s ease;
      box-shadow: 0 2px 8px rgba(251,191,36,0.3);
    }
    .btn-gold:hover {
      box-shadow: 0 4px 16px rgba(251,191,36,0.4);
      transform: translateY(-1px);
    }

    .btn-ghost {
      background: rgba(255,255,255,0.6);
      border: 1px solid rgba(0,0,0,0.08);
      color: #475569;
      transition: all 0.2s ease;
    }
    .btn-ghost:hover {
      border-color: rgba(251,191,36,0.3);
      color: #b45309;
      background: rgba(251,191,36,0.06);
    }

    /* User item selection */
    .user-item.selected {
      background: rgba(251,191,36,0.1);
      border-left: 3px solid #fbbf24;
    }
    .convo-item.selected {
      background: rgba(251,191,36,0.1);
      border-left: 3px solid #fbbf24;
    }

    /* Chart tooltip override */
    .chartjs-tooltip { font-family: 'IBM Plex Mono', monospace !important; }

    /* Bento grid utilities */
    .bento-span-2 { grid-column: span 2; }
    .bento-span-3 { grid-column: span 3; }
    .bento-row-2 { grid-row: span 2; }

    @media (max-width: 768px) {
      .bento-span-2, .bento-span-3 { grid-column: span 1; }
      .bento-row-2 { grid-row: span 1; }
    }

    /* KPI number highlight */
    .kpi-number {
      background: linear-gradient(135deg, #fbbf24 0%, #fcd34d 50%, #f59e0b 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Sidebar glass */
    .sidebar-glass {
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-right: 1px solid rgba(0,0,0,0.06);
    }

    /* Loading shimmer */
    .shimmer {
      background: linear-gradient(90deg, rgba(0,0,0,0.03) 25%, rgba(0,0,0,0.06) 50%, rgba(0,0,0,0.03) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
    }
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* File thumbnail */
    .file-thumb {
      width: 40px;
      height: 40px;
      object-fit: cover;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .file-thumb:hover {
      transform: scale(1.8);
      box-shadow: 0 8px 24px rgba(0,0,0,0.15);
      z-index: 10;
      position: relative;
    }

    /* Global HTMX loading bar */
    .htmx-loading-bar {
      position: fixed;
      top: 0; left: 0;
      width: 0;
      height: 2px;
      background: linear-gradient(90deg, #fbbf24, #f59e0b, #d97706);
      z-index: 9999;
      transition: width 0.3s ease;
      box-shadow: 0 0 8px rgba(251,191,36,0.5);
    }
    .htmx-loading-bar.active {
      width: 90%;
      animation: loadingPulse 1.5s ease-in-out infinite;
    }
    .htmx-loading-bar.done {
      width: 100%;
      transition: width 0.2s ease;
    }
    @keyframes loadingPulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }

    /* Per-element HTMX indicator (spinner) */
    .htmx-indicator {
      display: none;
    }
    .htmx-request .htmx-indicator,
    .htmx-request.htmx-indicator {
      display: inline-flex;
    }
    .htmx-request .htmx-hide-on-request {
      opacity: 0.4;
      pointer-events: none;
    }

    /* Inline spinner */
    .spinner-sm {
      width: 14px; height: 14px;
      border: 2px solid rgba(251,191,36,0.25);
      border-top-color: #f59e0b;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Target area loading overlay */
    .htmx-loading-overlay {
      position: relative;
    }
    .htmx-loading-overlay::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.6);
      backdrop-filter: blur(2px);
      border-radius: inherit;
      z-index: 10;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s ease;
    }
    .htmx-loading-overlay.htmx-loading::after {
      opacity: 1;
      animation: overlayShimmer 1.5s ease-in-out infinite;
    }
    @keyframes overlayShimmer {
      0%, 100% { background: rgba(255,255,255,0.5); }
      50% { background: rgba(255,255,255,0.7); }
    }
  </style>
</head>
<body class="min-h-screen bg-glass-bg bg-dot-pattern text-surface-800">
  <div id="htmx-loading-bar" class="htmx-loading-bar"></div>
  {% block body %}
  {% endblock %}

  <script>
    // Number formatting
    function fmtNum(n) {
      if (n == null) return '0';
      if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M';
      if (n >= 1e3) return (n / 1e3).toFixed(1) + 'K';
      return n.toLocaleString();
    }

    // Animated counter
    function animateCount(el, target, duration) {
      duration = duration || 800;
      const start = 0;
      const startTime = performance.now();
      function update(now) {
        const elapsed = now - startTime;
        const progress = Math.min(elapsed / duration, 1);
        const eased = 1 - Math.pow(1 - progress, 3);
        const current = Math.floor(start + (target - start) * eased);
        el.textContent = current.toLocaleString();
        if (progress < 1) requestAnimationFrame(update);
      }
      requestAnimationFrame(update);
    }

    // Initialize animated counters
    document.addEventListener('DOMContentLoaded', () => {
      document.querySelectorAll('[data-count]').forEach(el => {
        const target = parseInt(el.dataset.count, 10);
        if (!isNaN(target)) animateCount(el, target);
      });
    });

    // Global HTMX loading bar + target loading overlay
    (function() {
      const bar = document.getElementById('htmx-loading-bar');
      let activeRequests = 0;

      function showBar() {
        bar.classList.remove('done');
        bar.classList.add('active');
      }
      function hideBar(error) {
        bar.classList.remove('active');
        bar.classList.add('done');
        if (error) bar.style.background = 'linear-gradient(90deg, #ef4444, #dc2626)';
        setTimeout(() => {
          bar.classList.remove('done');
          bar.style.width = '0';
          bar.style.background = '';
        }, error ? 500 : 300);
      }

      document.body.addEventListener('htmx:beforeRequest', function(e) {
        activeRequests++;
        showBar();
        var target = e.detail.target || e.detail.elt;
        if (target) target.classList.add('htmx-loading');
      });

      document.body.addEventListener('htmx:afterOnLoad', function(e) {
        var target = e.detail.target || e.detail.elt;
        if (target) target.classList.remove('htmx-loading');
      });

      document.body.addEventListener('htmx:afterRequest', function() {
        activeRequests = Math.max(0, activeRequests - 1);
        if (activeRequests === 0) hideBar(false);
      });

      document.body.addEventListener('htmx:sendError', function(e) {
        var target = e.detail.target || e.detail.elt;
        if (target) target.classList.remove('htmx-loading');
        activeRequests = Math.max(0, activeRequests - 1);
        if (activeRequests === 0) hideBar(true);
      });
    })();
  </script>
</body>
</html>
