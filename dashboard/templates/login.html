{% extends "base.html" %}
{% block title %}登录 - LibreChat Dashboard{% endblock %}
{% block body %}
<div class="min-h-screen flex items-center justify-center px-4">
  <div class="w-full max-w-sm">
    <!-- Logo area -->
    <div class="text-center mb-8 fade-in">
      <div class="inline-flex items-center justify-center w-14 h-14 rounded-xl bg-gradient-to-br from-gold-400 to-gold-600 shadow-lg shadow-gold-500/20 mb-4">
        <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
        </svg>
      </div>
      <h1 class="text-xl font-bold text-surface-800 tracking-tight">LibreChat</h1>
      <p class="text-xs text-surface-500 mt-1 font-mono tracking-wider uppercase">数据控制台</p>
    </div>

    <!-- Login card -->
    <div class="bento-card rounded-2xl p-6 fade-in fade-in-1">
      {% if error %}
      <div class="bg-red-50 border border-red-200 text-red-600 px-3 py-2 rounded-lg mb-4 text-sm font-mono">
        {{ error }}
      </div>
      {% endif %}
      <form method="post" action="/login">
        <label class="block text-xs font-mono text-surface-500 mb-2 tracking-wider uppercase">访问密钥</label>
        <input type="password" name="password" required autofocus
               class="input-dark w-full rounded-lg px-3 py-2.5 mb-4 text-sm"
               placeholder="请输入密码...">
        <button type="submit"
                class="w-full btn-gold rounded-lg py-2.5 text-sm tracking-wide transition">
          登录
        </button>
      </form>
    </div>

    <p class="text-center text-surface-400 text-xs mt-6 font-mono">v1.0 — 安全访问</p>
  </div>
</div>
{% endblock %}
