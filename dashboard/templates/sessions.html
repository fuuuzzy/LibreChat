{% extends "base.html" %}
{% block title %}会话流水 - LibreChat Dashboard{% endblock %}
{% block body %}
<div class="flex min-h-screen">
  <!-- Sidebar -->
  <nav class="w-56 flex-shrink-0 sidebar-glass flex flex-col">
    <div class="px-5 py-5 border-b border-surface-200/60">
      <div class="flex items-center gap-2.5">
        <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-gold-400 to-gold-600 flex items-center justify-center shadow-sm">
          <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
          </svg>
        </div>
        <div>
          <h2 class="text-sm font-bold text-surface-800 tracking-tight">LibreChat</h2>
          <p class="text-[10px] text-surface-500 font-mono tracking-widest uppercase">控制台</p>
        </div>
      </div>
    </div>
    <div class="flex-1 py-4 px-3 space-y-0.5">
      <a href="/" class="nav-link flex items-center px-3 py-2 rounded-lg text-sm font-medium">
        <svg class="w-4 h-4 mr-2.5 opacity-60" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 5a1 1 0 011-1h4a1 1 0 011 1v5a1 1 0 01-1 1H5a1 1 0 01-1-1V5zm10 0a1 1 0 011-1h4a1 1 0 011 1v3a1 1 0 01-1 1h-4a1 1 0 01-1-1V5zM4 15a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1H5a1 1 0 01-1-1v-4zm10-2a1 1 0 011-1h4a1 1 0 011 1v6a1 1 0 01-1 1h-4a1 1 0 01-1-1v-6z"/></svg>
        仪表盘
      </a>
      <a href="/tokens" class="nav-link flex items-center px-3 py-2 rounded-lg text-sm font-medium">
        <svg class="w-4 h-4 mr-2.5 opacity-60" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1"/></svg>
        Token 对账
      </a>
      <a href="/usage" class="nav-link flex items-center px-3 py-2 rounded-lg text-sm font-medium">
        <svg class="w-4 h-4 mr-2.5 opacity-60" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"/></svg>
        使用记录
      </a>
      <a href="/sessions" class="nav-link active flex items-center px-3 py-2 rounded-lg text-sm font-medium">
        <svg class="w-4 h-4 mr-2.5 opacity-60" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg>
        会话流水
      </a>
    </div>
    <div class="px-4 py-3 border-t border-surface-200/60">
      <div class="flex items-center gap-2">
        <span class="w-1.5 h-1.5 rounded-full bg-gold-400"></span>
        <span class="text-[10px] text-surface-500 font-mono tracking-wider">手动模式</span>
      </div>
      <a href="/logout" class="text-[10px] text-surface-400 hover:text-red-500 mt-2 block font-mono tracking-wider transition">退出登录</a>
    </div>
  </nav>

  <!-- Main content -->
  <main class="flex-1 p-6 overflow-auto">
    <div class="mb-6 fade-in">
      <h1 class="text-xl font-bold text-surface-800 tracking-tight">会话浏览</h1>
      <p class="text-xs text-surface-500 font-mono mt-0.5">浏览用户、会话和消息</p>
    </div>

    <!-- Bento: Three-column drill-down -->
    <div class="grid grid-cols-1 lg:grid-cols-6 gap-3">

      <!-- Left: user list — 2 cols -->
      <div class="lg:col-span-2 fade-in fade-in-1">
        <div class="bento-card rounded-2xl">
          <div class="px-4 py-3 border-b border-surface-200/60">
            <input type="text" id="user-search" placeholder="搜索用户..."
                   value="{{ search }}"
                   hx-get="/sessions/users"
                   hx-target="#user-list-area"
                   hx-trigger="keyup changed delay:300ms"
                   hx-include="#user-search"
                   class="input-dark w-full rounded-lg px-3 py-1.5 text-sm">
          </div>
          <div id="user-list-area">
            {% include "partials/user_list.html" %}
          </div>
        </div>
      </div>

      <!-- Middle: conversation list — 2 cols -->
      <div class="lg:col-span-2 fade-in fade-in-2">
        <div class="bento-card rounded-2xl">
          <div class="px-4 py-3 border-b border-surface-200/60">
            <h3 class="text-[10px] font-mono text-surface-500 tracking-wider uppercase">会话列表</h3>
          </div>
          <div id="convo-list-area" class="p-4">
            <div class="text-center py-10">
              <svg class="w-8 h-8 text-surface-300 mx-auto mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M17 8h2a2 2 0 012 2v6a2 2 0 01-2 2h-2v4l-4-4H9a2 2 0 01-2-2v-6a2 2 0 012-2h8z"/></svg>
              <p class="text-xs text-surface-400 font-mono">请先选择用户</p>
            </div>
          </div>
        </div>
      </div>

      <!-- Right: message list — 2 cols -->
      <div class="lg:col-span-2 fade-in fade-in-3">
        <div class="bento-card rounded-2xl">
          <div class="px-4 py-3 border-b border-surface-200/60 flex items-center justify-between">
            <h3 class="text-[10px] font-mono text-surface-500 tracking-wider uppercase">消息列表</h3>
            <a id="export-msg-link" href="#" target="_blank"
               class="hidden btn-ghost px-2 py-0.5 rounded text-[10px] font-mono tracking-wider">导出</a>
          </div>
          <div id="msg-list-area" class="p-4">
            <div class="text-center py-10">
              <svg class="w-8 h-8 text-surface-300 mx-auto mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg>
              <p class="text-xs text-surface-400 font-mono">请选择会话</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<script>
const LOADING_SPINNER = `
<div class="flex items-center justify-center py-10">
  <svg class="animate-spin w-6 h-6 text-gold-400" fill="none" viewBox="0 0 24 24">
    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
  </svg>
</div>`;

function selectUser(userId) {
  document.querySelectorAll('.user-item').forEach(el => el.classList.remove('selected'));
  event.currentTarget.classList.add('selected');
  // Show loading immediately
  document.getElementById('convo-list-area').innerHTML = LOADING_SPINNER;
  document.getElementById('msg-list-area').innerHTML = '<div class="text-center py-10"><svg class="w-8 h-8 text-surface-300 mx-auto mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg><p class="text-xs text-surface-400 font-mono">请选择会话</p></div>';
  htmx.ajax('GET', '/sessions/conversations?user_id=' + userId, {target: '#convo-list-area', swap: 'innerHTML'});
}

function selectConvo(convoId, userId) {
  document.querySelectorAll('.convo-item').forEach(el => el.classList.remove('selected'));
  event.currentTarget.classList.add('selected');
  // Show loading immediately
  document.getElementById('msg-list-area').innerHTML = LOADING_SPINNER;
  htmx.ajax('GET', '/sessions/messages?conversation_id=' + convoId + '&user_id=' + userId, {target: '#msg-list-area', swap: 'innerHTML'});
  // Update export link
  document.getElementById('export-msg-link').href = '/export/messages?conversation_id=' + convoId + '&user_id=' + userId;
  document.getElementById('export-msg-link').classList.remove('hidden');
}
</script>
{% endblock %}
