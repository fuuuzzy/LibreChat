{% extends "base.html" %}
{% block title %}使用记录明细 - LibreChat Dashboard{% endblock %}
{% block body %}
<div class="flex h-screen overflow-hidden">
  <!-- Sidebar -->
  <nav class="w-56 flex-shrink-0 sidebar-glass flex flex-col">
    <div class="px-5 py-5 border-b border-surface-200/60">
      <div class="flex items-center gap-2.5">
        <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-gold-400 to-gold-600 flex items-center justify-center shadow-sm">
          <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
          </svg>
        </div>
        <div>
          <h2 class="text-sm font-bold text-surface-800 tracking-tight">LibreChat</h2>
          <p class="text-[10px] text-surface-500 font-mono tracking-widest uppercase">控制台</p>
        </div>
      </div>
    </div>
    <div class="flex-1 py-4 px-3 space-y-0.5">
      <a href="/" class="nav-link flex items-center px-3 py-2 rounded-lg text-sm font-medium">
        <svg class="w-4 h-4 mr-2.5 opacity-60" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 5a1 1 0 011-1h4a1 1 0 011 1v5a1 1 0 01-1 1H5a1 1 0 01-1-1V5zm10 0a1 1 0 011-1h4a1 1 0 011 1v3a1 1 0 01-1 1h-4a1 1 0 01-1-1V5zM4 15a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1H5a1 1 0 01-1-1v-4zm10-2a1 1 0 011-1h4a1 1 0 011 1v6a1 1 0 01-1 1h-4a1 1 0 01-1-1v-6z"/></svg>
        仪表盘
      </a>
      <a href="/tokens" class="nav-link flex items-center px-3 py-2 rounded-lg text-sm font-medium">
        <svg class="w-4 h-4 mr-2.5 opacity-60" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1"/></svg>
        Token 对账
      </a>
      <a href="/usage" class="nav-link active flex items-center px-3 py-2 rounded-lg text-sm font-medium">
        <svg class="w-4 h-4 mr-2.5 opacity-60" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"/></svg>
        使用记录
      </a>
      <a href="/sessions" class="nav-link flex items-center px-3 py-2 rounded-lg text-sm font-medium">
        <svg class="w-4 h-4 mr-2.5 opacity-60" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg>
        会话流水
      </a>
      <a href="/files" class="nav-link flex items-center px-3 py-2 rounded-lg text-sm font-medium">
        <svg class="w-4 h-4 mr-2.5 opacity-60" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13"/></svg>
        文件管理
      </a>
    </div>
    <div class="px-4 py-3 border-t border-surface-200/60">
      <div class="flex items-center gap-2">
        <span class="w-1.5 h-1.5 rounded-full bg-gold-400"></span>
        <span class="text-[10px] text-surface-500 font-mono tracking-wider">手动模式</span>
      </div>
      <a href="/logout" class="text-[10px] text-surface-400 hover:text-red-500 mt-2 block font-mono tracking-wider transition">退出登录</a>
    </div>
  </nav>

  <!-- Main content -->
  <main class="flex-1 p-6 overflow-auto">
    <!-- Header -->
    <div class="flex items-center justify-between mb-6 fade-in">
      <div>
        <h1 class="text-xl font-bold text-surface-800 tracking-tight">使用记录明细</h1>
        <p class="text-xs text-surface-500 font-mono mt-0.5">每条 Token 使用记录的详细信息</p>
      </div>
      <a href="/export/usage?start={{ start }}&end={{ end }}&user_id={{ selected_user }}&model={{ selected_model }}"
         class="btn-ghost inline-flex items-center gap-2 px-3 py-1.5 rounded-lg text-xs font-mono">
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
        导出
      </a>
    </div>

    <!-- Filters -->
    <form id="usage-filter-form" class="bento-card rounded-xl p-4 mb-5 fade-in fade-in-1"
          hx-get="/usage/table"
          hx-target="#usage-table-area"
          hx-swap="innerHTML"
          hx-trigger="submit">
      <!-- Quick date buttons -->
      <div class="flex items-center gap-1.5 mb-3">
        <span class="text-[10px] font-mono text-surface-500 tracking-wider uppercase mr-1">快捷：</span>
        <button type="button" onclick="setDateRange('today')" class="date-quick-btn px-2.5 py-1 rounded-md text-[11px] font-mono text-surface-500 border border-surface-200/60 hover:border-gold-400/40 hover:text-gold-700 hover:bg-gold-400/5 transition">今天</button>
        <button type="button" onclick="setDateRange('7d')" class="date-quick-btn px-2.5 py-1 rounded-md text-[11px] font-mono text-surface-500 border border-surface-200/60 hover:border-gold-400/40 hover:text-gold-700 hover:bg-gold-400/5 transition">近7天</button>
        <button type="button" onclick="setDateRange('30d')" class="date-quick-btn px-2.5 py-1 rounded-md text-[11px] font-mono text-surface-500 border border-surface-200/60 hover:border-gold-400/40 hover:text-gold-700 hover:bg-gold-400/5 transition">近30天</button>
        <button type="button" onclick="setDateRange('all')" class="date-quick-btn px-2.5 py-1 rounded-md text-[11px] font-mono text-surface-500 border border-surface-200/60 hover:border-gold-400/40 hover:text-gold-700 hover:bg-gold-400/5 transition">全部</button>
      </div>
      <div class="flex items-end gap-4 flex-wrap">
        <div>
          <label class="block text-[10px] font-mono text-surface-500 mb-1.5 tracking-wider uppercase">开始日期</label>
          <input type="date" name="start" value="{{ start }}" class="input-dark rounded-lg px-3 py-1.5 text-sm font-mono">
        </div>
        <div>
          <label class="block text-[10px] font-mono text-surface-500 mb-1.5 tracking-wider uppercase">结束日期</label>
          <input type="date" name="end" value="{{ end }}" class="input-dark rounded-lg px-3 py-1.5 text-sm font-mono">
        </div>
        <div>
          <label class="block text-[10px] font-mono text-surface-500 mb-1.5 tracking-wider uppercase">用户</label>
          <select name="user_id" class="input-dark rounded-lg px-3 py-1.5 text-sm font-mono min-w-[160px]">
            <option value="">全部用户</option>
            {% for u in users %}
            <option value="{{ u._id }}" {% if selected_user == u._id|string %}selected{% endif %}>
              {{ u.userInfo.name if u.userInfo else u._id }}
            </option>
            {% endfor %}
          </select>
        </div>
        <div>
          <label class="block text-[10px] font-mono text-surface-500 mb-1.5 tracking-wider uppercase">模型</label>
          <select name="model" class="input-dark rounded-lg px-3 py-1.5 text-sm font-mono min-w-[180px]">
            <option value="">全部模型</option>
            {% for m in models %}
            <option value="{{ m }}" {% if selected_model == m %}selected{% endif %}>{{ m }}</option>
            {% endfor %}
          </select>
        </div>
        <button type="submit" class="btn-gold px-4 py-1.5 rounded-lg text-xs font-mono tracking-wide">
          查询
        </button>
        <a href="/usage" class="btn-ghost px-3 py-1.5 rounded-lg text-xs font-mono tracking-wide">
          重置
        </a>
      </div>
    </form>

    <!-- Table area -->
    <div id="usage-table-area" class="fade-in fade-in-2 htmx-loading-overlay">
      {% include "partials/usage_table.html" %}
    </div>
  </main>
</div>

<script>
function setDateRange(range) {
  const form = document.getElementById('usage-filter-form');
  const startInput = form.querySelector('input[name="start"]');
  const endInput = form.querySelector('input[name="end"]');
  const today = new Date();
  const fmt = d => { const y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,'0'), dd=String(d.getDate()).padStart(2,'0'); return `${y}-${m}-${dd}`; };

  if (range === 'today') {
    startInput.value = fmt(today);
    endInput.value = fmt(today);
  } else if (range === '7d') {
    const s = new Date(today); s.setDate(s.getDate() - 6);
    startInput.value = fmt(s);
    endInput.value = fmt(today);
  } else if (range === '30d') {
    const s = new Date(today); s.setDate(s.getDate() - 29);
    startInput.value = fmt(s);
    endInput.value = fmt(today);
  } else if (range === 'all') {
    startInput.value = 'all';
    endInput.value = 'all';
  }

  // Highlight active button
  form.querySelectorAll('.date-quick-btn').forEach(btn => {
    btn.classList.remove('bg-gold-400/10', 'text-gold-700', 'border-gold-400/40');
    btn.classList.add('text-surface-500', 'border-surface-200/60');
  });
  event.target.classList.add('bg-gold-400/10', 'text-gold-700', 'border-gold-400/40');
  event.target.classList.remove('text-surface-500', 'border-surface-200/60');

  // Auto-submit
  form.querySelector('button[type="submit"]').click();
}
</script>
{% endblock %}
